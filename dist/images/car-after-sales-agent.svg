<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1F2A44"/>
      <stop offset="100%" style="stop-color:#0E0E0C"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60A5FA"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.08" stroke="#fff" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
  </g>
  <!-- Car silhouette -->
  <g transform="translate(250, 180)" opacity="0.9">
    <path d="M50 200 L50 160 Q50 140 70 140 L130 140 L160 100 Q170 80 190 80 L310 80 Q330 80 340 100 L370 140 L430 140 Q450 140 450 160 L450 200 Q450 220 430 220 L370 220 Q350 220 350 200 Q350 180 330 180 Q310 180 310 200 Q310 220 290 220 L210 220 Q190 220 190 200 Q190 180 170 180 Q150 180 150 200 Q150 220 130 220 L70 220 Q50 220 50 200Z" fill="none" stroke="#60A5FA" stroke-width="2"/>
    <!-- Wheels -->
    <circle cx="170" cy="200" r="30" fill="none" stroke="#60A5FA" stroke-width="2"/>
    <circle cx="170" cy="200" r="15" fill="none" stroke="#60A5FA" stroke-width="1"/>
    <circle cx="330" cy="200" r="30" fill="none" stroke="#60A5FA" stroke-width="2"/>
    <circle cx="330" cy="200" r="15" fill="none" stroke="#60A5FA" stroke-width="1"/>
  </g>
  <!-- AI Circuit pattern -->
  <g transform="translate(550, 100)" opacity="0.3">
    <circle cx="0" cy="0" r="8" fill="#60A5FA"/>
    <line x1="8" y1="0" x2="40" y2="0" stroke="#60A5FA" stroke-width="1"/>
    <circle cx="48" cy="0" r="6" fill="#60A5FA"/>
    <line x1="0" y1="8" x2="0" y2="40" stroke="#60A5FA" stroke-width="1"/>
    <circle cx="0" cy="48" r="6" fill="#60A5FA"/>
    <line x1="48" y1="6" x2="48" y2="30" stroke="#60A5FA" stroke-width="1"/>
    <circle cx="48" cy="38" r="5" fill="#60A5FA"/>
    <line x1="6" y1="48" x2="30" y2="48" stroke="#60A5FA" stroke-width="1"/>
    <circle cx="38" cy="48" r="5" fill="#60A5FA"/>
  </g>
  <!-- Text -->
  <text x="400" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="600" fill="#fff" opacity="0.9">车企 AI Agent 售后智能化</text>
  <text x="400" y="520" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#94A3B8">Dify · 知识库 · 商业化</text>
