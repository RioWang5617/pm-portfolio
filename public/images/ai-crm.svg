<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2A2520"/>
      <stop offset="100%" style="stop-color:#0F0F0E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#fff" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
  </g>
  <!-- CRM Dashboard -->
  <g transform="translate(150, 100)">
    <!-- Main panel -->
    <rect x="0" y="0" width="500" height="320" rx="8" fill="none" stroke="#F59E0B" stroke-width="2" opacity="0.8"/>
    <!-- Header -->
    <rect x="0" y="0" width="500" height="40" rx="8" fill="#F59E0B" opacity="0.15"/>
    <circle cx="20" cy="20" r="6" fill="#EF4444"/>
    <circle cx="40" cy="20" r="6" fill="#F59E0B"/>
    <circle cx="60" cy="20" r="6" fill="#22C55E"/>
    <!-- Sidebar -->
    <rect x="0" y="40" width="120" height="280" fill="#F59E0B" opacity="0.05"/>
    <rect x="15" y="60" width="90" height="12" rx="3" fill="#F59E0B" opacity="0.3"/>
    <rect x="15" y="85" width="70" height="12" rx="3" fill="#F59E0B" opacity="0.2"/>
    <rect x="15" y="110" width="80" height="12" rx="3" fill="#F59E0B" opacity="0.2"/>
    <rect x="15" y="135" width="65" height="12" rx="3" fill="#F59E0B" opacity="0.2"/>
    <!-- Content area - cards -->
    <rect x="140" y="55" width="160" height="80" rx="6" fill="#F59E0B" opacity="0.1" stroke="#F59E0B" stroke-width="1"/>
    <rect x="320" y="55" width="160" height="80" rx="6" fill="#F59E0B" opacity="0.1" stroke="#F59E0B" stroke-width="1"/>
    <!-- Chart bars -->
    <rect x="140" y="160" width="30" height="60" rx="3" fill="#F59E0B" opacity="0.4"/>
    <rect x="180" y="140" width="30" height="80" rx="3" fill="#F59E0B" opacity="0.5"/>
    <rect x="220" y="150" width="30" height="70" rx="3" fill="#F59E0B" opacity="0.4"/>
    <rect x="260" y="130" width="30" height="90" rx="3" fill="#F59E0B" opacity="0.6"/>
    <rect x="300" y="120" width="30" height="100" rx="3" fill="#F59E0B" opacity="0.7"/>
    <!-- Table -->
    <rect x="140" y="250" width="340" height="15" rx="2" fill="#F59E0B" opacity="0.15"/>
    <rect x="140" y="275" width="340" height="10" rx="2" fill="#F59E0B" opacity="0.08"/>
    <rect x="140" y="295" width="340" height="10" rx="2" fill="#F59E0B" opacity="0.08"/>
    <rect x="140" y="315" width="340" height="10" rx="2" fill="#F59E0B" opacity="0.08"/>
  </g>
  <!-- AI sparkle -->
  <g transform="translate(620, 180)" opacity="0.5">
    <path d="M0 20 L5 0 L10 20 L20 25 L10 30 L5 50 L0 30 L-10 25Z" fill="#F59E0B"/>
  </g>
  <!-- Text -->
  <text x="400" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="600" fill="#fff" opacity="0.9">企业自研 AI CRM</text>
  <text x="400" y="520" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#94A3B8">Copilot · 智能填表 · 8 大模块</text>
</svg>